<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIVE SLIDE COMMANDER</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712;
      --surface: #0f172a;
      --accent: #06b6d4;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
    }
    body {
        background: var(--bg); color: var(--text);
        font-family: 'Inter', sans-serif; margin: 0; padding: 2rem;
        display: flex; flex-direction: column; align-items: center;
    }
    .card {
        background: var(--surface); border: 2px solid var(--accent);
        padding: 2rem; border-radius: 24px; width: 100%; max-width: 600px;
        box-shadow: 0 0 50px rgba(6, 182, 212, 0.15);
    }
    .title { font-weight: 900; font-size: 1.5rem; color: var(--accent); margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
    .label { font-size: 0.7rem; font-weight: 900; opacity: 0.5; margin-bottom: 8px; text-transform: uppercase; }
    input, textarea, select {
        width: 100%; background: #000; border: 1px solid var(--border);
        color: #fff; padding: 14px; border-radius: 12px; margin-bottom: 1.5rem;
        font-family: inherit; font-size: 1rem; box-sizing: border-box;
    }
    textarea { height: 120px; resize: none; }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .btn {
        padding: 18px; border-radius: 12px; font-weight: 900; border: none;
        cursor: pointer; text-transform: uppercase; transition: 0.2s;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-secondary { background: #1e293b; color: #fff; }
    .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    /* Compact Mode */
    body.compact { padding: 1rem; }
    body.compact .card { padding: 1.2rem; border-radius: 12px; max-width: 100%; border-width: 1px; }
    body.compact .title { font-size: 1rem; margin-bottom: 1rem; }
    body.compact .label { font-size: 0.6rem; margin-bottom: 4px; }
    body.compact input, body.compact textarea, body.compact select { 
        padding: 8px; font-size: 0.85rem; margin-bottom: 0.8rem; border-radius: 8px; 
    }
    body.compact textarea { height: 70px; }
    body.compact .btn { padding: 10px; font-size: 0.8rem; border-radius: 8px; }
    body.compact .btn-group { margin-top: 0.5rem; }
  </style>
</head>
<body>

<div class="card">
    <div class="title">Live Slide Commander</div>
    
    <div class="label">Primary Heading</div>
    <input type="text" id="live-title" placeholder="URGENT ANNOUNCEMENT...">

    <div class="label">Detailed Subtext</div>
    <textarea id="live-detail" placeholder="Enter full details here..."></textarea>
    
    <div style="display:grid; grid-template-columns: 1fr 2fr; gap: 1rem; margin-bottom: 2rem;">
        <div>
            <div class="label">Accent Color</div>
            <input type="color" id="live-accent" value="#06b6d4" style="height: 50px; padding: 4px;">
        </div>
        <div>
            <div class="label">Broadcast Mode</div>
            <select id="live-mode">
                <option value="OVERRIDE">OVERRIDE (PAUSE LOOP)</option>
                <option value="INJECT">INJECT INTO LOOP</option>
            </select>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" onclick="pushLiveSlide()">Push to Billboard</button>
        <button class="btn btn-secondary" onclick="clearLiveSlide()">Clear Live</button>
    </div>
</div>

<script>
    const bc = new BroadcastChannel('ct_matrix_sync');
    if (window.location.search.includes('compact=true')) {
        document.body.classList.add('compact');
    }

    function pushLiveSlide() {
        const payload = {
            active: true,
            title: document.getElementById('live-title').value,
            detail: document.getElementById('live-detail').value,
            accent: document.getElementById('live-accent').value,
            mode: document.getElementById('live-mode').value
        };
        bc.postMessage({ type: 'LIVE_SLIDE', payload });
        alert('LIVE SLIDE PUSHED TO MATRIX');
    }

    function clearLiveSlide() {
        bc.postMessage({ type: 'LIVE_SLIDE', payload: { active: false } });
        document.getElementById('live-title').value = '';
        document.getElementById('live-detail').value = '';
        alert('LIVE SLIDE CLEARED');
    }
</script>
</body>
</html>
